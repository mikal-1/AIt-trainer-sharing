  .nav-logo {

    font-size: 0.85rem; color: var(--teal-light); letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .nav-back {
    display: none; align-items: center; gap: 0.5rem;
    background: none; border: none; cursor: pointer;
    color: var(--teal-light); font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 500; letter-spacing: 0.04em;

  .nav-back:hover { color: var(--white); }
  .nav-back svg { width: 16px; height: 16px; }
  .nav-back.visible { display: flex; }

    position: relative; overflow: hidden;

    content: '';

    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    transform: scaleX(0); transform-origin: left;

    position: absolute; bottom: 1.5rem; right: 1.5rem;
    color: var(--teal-light); transition: color 0.2s, transform 0.2s;
  }

    display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 2rem;

</style>
</head>

const badgeClass = { good: "green", note: "amber", gap: "red", "no data": "gray" };
const borderClass = { good: "green-border", note: "amber-border", gap: "red-border", "no data": "gray-border" };

function buildHome() {
  const grid = document.getElementById("trainersGrid");
  grid.innerHTML = TRAINERS.map(t => `
    <div class="trainer-card" onclick="showDetail('${t.id}')">
      <div class="card-name">${t.name}</div>
      <div class="card-role">Trainer</div>
      <div class="card-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>
    </div>
  `).join("");
}

function showDetail(id) {
  const t = TRAINERS.find(x => x.id === id);
  if (!t) return;

  document.getElementById("detailName").textContent = t.name;

  const body = document.getElementById("detailBody");
  body.innerHTML = `
    <div class="summary-box">
      <div class="summary-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
        </svg>
      </div>
      <div class="summary-text">
        <p>Observation Summary</p>
        <p>${t.summary}</p>
      </div>
    </div>

    <div class="score-row">
      <span style="font-size:0.75rem;font-weight:600;color:var(--teal-mid);margin-right:0.5rem;text-transform:uppercase;letter-spacing:0.06em;">Key</span>
      <span class="score-item"><span class="score-dot" style="background:var(--teal)"></span>Good</span>
      <span class="score-item"><span class="score-dot" style="background:#D97706"></span>Note</span>
      <span class="score-item"><span class="score-dot" style="background:#B91C1C"></span>Gap</span>
      <span class="score-item"><span class="score-dot" style="background:#ccc"></span>No data</span>
    </div>

    ${t.sections.map(sec => `
      <div class="section-label">${sec.label}</div>
      ${sec.items.map(item => `
        <div class="obs-card ${borderClass[item.badge] || "gray-border"}">
          <div class="obs-header">
            <div class="obs-title">${item.title}</div>
            <span class="obs-badge ${badgeClass[item.badge] || "gray"}">${item.badge}</span>
          </div>
          <div class="obs-text">${item.text}</div>
          ${item.quote ? `<div class="obs-quote">${item.quote}</div>` : ""}
          ${item.quote2 ? `<div class="obs-quote">${item.quote2}</div>` : ""}
        </div>
      `).join("")}
    `).join("")}

    <footer>ATHLETIC INC &nbsp;·&nbsp; Psychological Climate Review &nbsp;·&nbsp; Confidential</footer>
  `;

  document.getElementById("homePage").classList.remove("active");
  document.getElementById("detailPage").classList.add("active");
  document.getElementById("navBack").classList.add("visible");
  window.scrollTo(0, 0);
}

function showHome() {
  document.getElementById("detailPage").classList.remove("active");
  document.getElementById("homePage").classList.add("active");
  document.getElementById("navBack").classList.remove("visible");
  window.scrollTo(0, 0);
}

buildHome();
</script>
